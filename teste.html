<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criador de Cartazes - Lojas Nordestina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos Melhorados com Efeito Aurora e Responsividade */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a237e, #3949ab, #5c6bc0, #3f51b5, #283593);
      background-size: 400% 400%;
      animation: aurora-animation 15s ease infinite;
      overflow: hidden;
    }

    @keyframes aurora-animation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .cartaz {
      width: 90%;
      max-width: 450px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
    }

    .produto-imagem {
      width: 100%;
      height: 300px;
      object-fit: contain;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .produto-nome {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
      color: #ffffff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .produto-preco {
      font-size: 22px;
      font-weight: normal;
      color: #f0f0f0;
      margin-top: 5px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
    }

    /* Media Query para dispositivos móveis */
    @media (max-width: 600px) {
      .cartaz {
        padding: 15px;
      }
      .produto-nome {
        font-size: 24px;
      }
      .produto-preco {
        font-size: 20px;
      }
      .produto-imagem {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <main>
    <!-- Cartaz do Produto com Estilo Melhorado -->
    <div class="cartaz">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1999" class="produto-imagem" alt="Relógio de Pulso Elegante">
      <div class="produto-nome">Relógio de Pulso Elegante</div>
      <div class="produto-preco">R$ 499,90</div>
    </div>
  </main>
</body>
</html>
